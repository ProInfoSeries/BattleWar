<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BattleWarSettings</title>
  <link rel="stylesheet" href="style.css">
<style>
.settings-title {
  text-align: center;
  margin: 40px 0 20px;
  font-size: 32px;
  color: white;
}

.settings-tabs {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.tab-btn {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  background-color: #333;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.tab-btn:hover {
  background-color: #555;
}

.triangle-back {
  display: flex;
  justify-content: center;
  margin-top: -10px;
}

.triangle-btn {
  width: 100px;
  height: 60px;
  background-color: #444;
  color: white;
  font-weight: bold;
  border: none;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  cursor: pointer;
  transition: background-color 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.triangle-btn:hover {
  background-color: #666;
}

.settings-panel {
  background-color: #222;
  border: 2px solid #555;
  border-radius: 8px;
  padding: 20px;
  margin: 20px auto;
  width: 80%;
  color: white;
}

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.setting-row label {
  font-weight: bold;
  font-size: 16px;
  flex: 1;
  min-width: 150px;
}

.button-group {
  display: flex;
  gap: 10px;
  flex: 2;
  justify-content: flex-start;
}

.setting-btn {
  padding: 8px 16px;
  font-weight: bold;
  background-color: #444;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.setting-btn:hover {
  background-color: #666;
}

.ai-choice-row {
  display: flex;
  justify-content: space-around;
  gap: 20px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.ai-card {
  text-align: center;
  flex: 1;
  min-width: 120px;
}

.ai-thumbnail {
  width: 100px;
  height: 100px;
  background-color: #333;
  border: 2px solid #666;
  border-radius: 8px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
}

.more-settings-label {
  font-size: 20px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  margin-bottom: 10px;
  text-align: center;
}

.save-load-label {
  font-size: 20px;
  font-weight: bold;
  color: white;
  margin-bottom: 10px;
  text-align: center;
}

.setting-btn.selected {
  background-color: #0a84ff;
  color: white;
}


</style>
</head>

<script>
function toggleDropdown() {
  const dropdown = document.getElementById('moreSettingsDropdown');
  dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
}

// Optional: unlock water settings only if Impossible Pack is active
let impossiblePackUnlocked = true; // Change to false to hide

if (impossiblePackUnlocked) {
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('waterSettings').style.display = 'block';
  });
}
</script>

<div class="settings-panel">
  <h2 class="save-load-label">Save & Load Settings</h2>

  <div class="setting-row">
    <button class="setting-btn" onclick="saveSettings()">💾 Save Settings</button>
    <button class="setting-btn" onclick="loadSettings()">📂 Load Settings</button>
    <button class="setting-btn" onclick="resetSettings()">🔄 Reset to Defaults</button>
  </div>
</div>

<script>
function saveSettings() {
  const buttons = document.querySelectorAll('.setting-btn');
  const settings = {};
  buttons.forEach(btn => {
    if (btn.classList.contains('selected')) {
      const label = btn.closest('.setting-row')?.querySelector('label')?.textContent || 'misc';
      settings[label] = btn.textContent;
    }
  });
  localStorage.setItem('battlewarSettings', JSON.stringify(settings));
  alert('Settings saved!');
}

function loadSettings() {
  const saved = JSON.parse(localStorage.getItem('battlewarSettings') || '{}');
  document.querySelectorAll('.setting-btn').forEach(btn => {
    const label = btn.closest('.setting-row')?.querySelector('label')?.textContent || 'misc';
    if (saved[label] === btn.textContent) {
      btn.classList.add('selected');
    } else {
      btn.classList.remove('selected');
    }
  });
  alert('Settings loaded!');
}

function resetSettings() {
  localStorage.removeItem('battlewarSettings');
  document.querySelectorAll('.setting-btn').forEach(btn => btn.classList.remove('selected'));
  alert('Settings reset to defaults.');
}
</script>

<script>
document.querySelectorAll('.setting-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.parentElement.querySelectorAll('.setting-btn');
    group.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

</script>
