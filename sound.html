<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BattleWarSound</title>
  <link rel="stylesheet" href="style.css">


<style>

.sfx-settings-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}


.sfx-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #222;
  padding: 12px 20px;
  border-radius: 8px;
  border: 1px solid #444;
  flex-wrap: wrap;
}

.sfx-label-toggle {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 200px;
  color: white;
}

.sfx-volume {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 200px;
  color: white;
}

.sfx-volume input[type="range"] {
  width: 100%;
  margin-top: 6px;
}
.back-button-container {
  text-align: center;
  margin-top: 40px;
}

.back-btn {
  display: inline-block;
  padding: 10px 20px;
  background-color: #444;
  color: white;
  border: none;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  transition: background-color 0.2s ease;
}

.back-btn:hover {
  background-color: #666;
}
</style>
</head>


<body>
<div class="back-button-container">
  <a href="index.html" class="back-btn">← Back</a>
</div>
